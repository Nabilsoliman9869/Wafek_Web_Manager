# Wafek_Web_Manager — Render Blueprint
# رفع على https://dashboard.render.com ثم New > Blueprint
services:
  - type: web
    runtime: docker
    name: wafek-manager
    region: frankfurt
    plan: starter

    # القرص الدائم + مسار الإعدادات — الإعدادات تُدار من /Setup
    disk:
      name: wafek-config
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: CONFIG_PATH
        value: /data
